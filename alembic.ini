# ============================================================
# Alembic — управление миграциями БД
# ============================================================
# Использование:
#   alembic revision --autogenerate -m "описание"   создать миграцию
#   alembic upgrade head                            применить
#   alembic downgrade -1                            откатить на 1 шаг
#   alembic current                                 текущая версия
# ============================================================

[alembic]
script_location = alembic
prepend_sys_path = .

# Шаблон имён файлов миграций: 2026_05_08_1530-abc123_create_users.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# DSN читается из app.config — в env.py
# (поэтому здесь sqlalchemy.url не задан)

# Логирование Alembic — отдельно от приложения
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
