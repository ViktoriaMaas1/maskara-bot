[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async тесты
asyncio_mode = auto

# Подробный вывод и хорошие сообщения об ошибках
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Маркеры
markers =
    unit: быстрые юнит-тесты (без внешних зависимостей)
    integration: требуют запущенных Postgres/Redis (для Шага 1.11)

# Игнорируем предупреждения о deprecation в зависимостях
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
